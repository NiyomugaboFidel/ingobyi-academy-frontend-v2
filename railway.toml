# Railway — frontend (Next.js) service
# Dashboard: Settings → Root Directory = frontend
# Set NEXT_PUBLIC_* vars BEFORE first deploy (baked at build time).

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"
watchPatterns = ["src/**", "public/**"]

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
